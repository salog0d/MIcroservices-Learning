# ============================================================
# CURRENCY CONVERSION SERVICE - application.properties
# ============================================================

# Nombre del servicio. Debe coincidir con el nombre que otros servicios
# usarian para referenciarlo en un Service Registry (Eureka).
# NOTA: hay un typo historico "coonversion" en lugar de "conversion"
spring.application.name=currency-coonversion

# Importa configuracion del Config Server al arrancar.
# Si el Config Server no esta disponible, el servicio falla al arrancar.
spring.config.import=configserver:http://localhost:8888

# Puerto en que corre este servicio.
# Por convencion en el proyecto:
#   8888 -> Config Server
#   8000 -> Currency Exchange Service
#   8100 -> Currency Conversion Service (este servicio)
server.port=8100
eureka.client.service-url.defauktZone=http://localhost:8761/eureka

# FLUJO COMPLETO DEL SISTEMA:
# ============================================================
# Usuario -> GET /currency-conversion-feing/from/USD/to/INR/quantity/10
#               |
#               v
#         [Currency Conversion :8100]  <- ESTE SERVICIO
#               |
#               | Feign Client HTTP GET /currency-exchange/from/USD/to/INR
#               v
#         [Currency Exchange :8000]
#               |
#               | JPA Query: SELECT * FROM currency_exchange WHERE ...
#               v
#         [H2 Database :mem:testdb]
#               |
#               | { id: 10001, from: "USD", to: "INR", conversionMultiple: 65 }
#               v
#         [Currency Exchange :8000]
#               |
#               | { ..., environment: "8000" }
#               v
#         [Currency Conversion :8100]
#               |
#               | Calcula: 10 * 65 = 650
#               v
#         Usuario <- { from: "USD", to: "INR", quantity: 10,
#                      conversionMultiple: 65, totalCalculatedAmount: 650,
#                      environment: "8000" }
