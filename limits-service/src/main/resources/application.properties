# ============================================================
# LIMITS SERVICE - application.properties
# ============================================================
#
# CONCEPTO: Config LOCAL vs config REMOTA
# ----------------------------------------
# Este archivo solo contiene la configuracion MINIMA necesaria
# para que el servicio se conecte al Config Server.
# El resto de la configuracion (valores de negocio como minimum/maximum)
# viene del Config Server via Git.
#
# REGLA DE ORO: En application.properties local van solo:
#   - Nombre del servicio
#   - Puerto
#   - URL del Config Server
#   - Perfil activo
#
# TODO lo demas deberia estar en el Config Server.
# ============================================================

# Nombre de la aplicacion. DEBE coincidir con el nombre del archivo
# en el repo de configuracion: limits-service.properties
# El Config Server usa este nombre para buscar los archivos correctos.
spring.application.name=limits-service

# Perfil activo: determina que archivo de config especifico cargar.
# Con "qa" activo, el Config Server buscara:
#   1. limits-service.properties (siempre)
#   2. limits-service-qa.properties (por el perfil)
spring.profiles.active=qa

# CONCEPTO: spring.config.import (Spring Boot 2.4+)
# ---------------------------------------------------
# Le dice a Spring Boot donde importar configuracion adicional.
# "configserver:" es el prefijo que activa el cliente de Spring Cloud Config.
# Al arrancar, Spring Boot hace:
#   GET http://localhost:8888/limits-service/qa/master
spring.config.import=configserver:http://localhost:8888

# Si el Config Server no responde, el servicio falla al arrancar.
# En produccion siempre usar true para evitar servicios con config incorrecta.
# En desarrollo podrias ponerlo en false para trabajar offline.
spring.cloud.config.fail-fast=true
