# ============================================================
# CONFIG SERVER - application.properties
# ============================================================
#
# CONCEPTO: Este archivo configura el propio Config Server,
# NO la configuracion de los otros microservicios.
# Los demas microservicios obtienen SU config via HTTP
# apuntando a este servidor.
# ============================================================

# Nombre de esta aplicacion. Importante para que Spring Boot
# sepa como identificarla ante otros servicios.
spring.application.name=spring_cloud_config_server

# Puerto en el que corre el Config Server.
# Por convencion se usa 8888 para el config server.
# Los clientes apuntaran a: http://localhost:8888
server.port=8888

# CONCEPTO: Backend de configuracion - Git
# -----------------------------------------
# El Config Server soporta multiples backends:
#   - Git (local o remoto) <- el mas comun y recomendado
#   - Filesystem
#   - Vault (HashiCorp)
#   - JDBC
#
# Aqui usamos un repositorio Git LOCAL (file://).
# En produccion seria una URL de GitHub/GitLab:
#   spring.cloud.config.server.git.uri=https://github.com/org/config-repo
spring.cloud.config.server.git.uri=file:///home/salog0d/Downloads/microservices/git-local-config-repo

# La rama (branch) de Git de donde se lee la config.
# En produccion usarias "main" o "master".
# NOTA: En Git moderno el default es "main"; si usas "master"
# y el repo usa "main", habra un error al arrancar.
spring.cloud.config.server.git.default-label=master

# Clona el repo al arrancar en lugar de hacerlo en la primera peticion.
# Recomendado en produccion: falla rapido si el repo no es accesible.
spring.cloud.config.server.git.clone-on-start=true

# H2 Console (no es parte del Config Server en si, es auxiliar de pruebas)
spring.h2.console.enabled=true
