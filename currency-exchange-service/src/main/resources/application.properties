# ============================================================
# CURRENCY EXCHANGE SERVICE - application.properties
# ============================================================

# Nombre de la aplicacion. Se usa para:
#   1. Identificarse ante el Config Server
#   2. Identificarse ante el Service Registry (Eureka, si se usa)
#   3. En Feign Client: el "name" del @FeignClient debe coincidir
spring.application.name=currency-exchange

# Muestra el SQL generado por Hibernate en la consola.
# MUY util en desarrollo para entender que queries se ejecutan.
# En produccion: spring.jpa.show-sql=false (impacto en performance y logs)
spring.jpa.show-sql=true

# Activa la consola web de H2 para inspeccionar la BD en el navegador.
# URL: http://localhost:8000/h2-console
# JDBC URL: jdbc:h2:mem:testdb
# En produccion: false (no exponer herramientas de debug)
spring.h2.console.enabled=true

# CONCEPTO: H2 - Base de datos en memoria
# ----------------------------------------
# H2 es perfecta para desarrollo y pruebas:
#   - No necesitas instalar nada
#   - Los datos se pierden al reiniciar (en modo "mem:")
#   - Muy rapida
#
# En produccion usarias: PostgreSQL, MySQL, Oracle, etc.
# Solo cambiarias la datasource URL y el driver, el codigo JPA es igual.
spring.datasource.url=jdbc:h2:mem:testdb

# Importacion de config desde el Config Server (puerto 8888)
spring.config.import=optional:configserver:http://localhost:8888

# Puerto fijo en 8000.
# NOTA: Para escalar horizontalmente (multiples instancias locales)
# podrias correr una segunda instancia con:
#   java -jar currency-exchange.jar --server.port=8001
server.port=8000

# CONCEPTO: defer-datasource-initialization
# ------------------------------------------
# Hace que Spring inicialice la datasource DESPUES de que Hibernate
# haya creado las tablas. Necesario para que data.sql/import.sql
# pueda insertar datos en tablas que JPA crea automaticamente.
# Sin esto: error "tabla no existe" al ejecutar data.sql
spring.jpa.defer-datasource-initialization=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
